# Workflow per il deploy automatico su GitHub Pages
name: Deploy PianetaSim su GitHub Pages

on:
  push:
    branches: ["main", "master"] # Esegui il deploy ad ogni push su main o master
  workflow_dispatch: # Permette di avviare il deploy manualmente dalla tab Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installa dipendenze
        run: npm install

      - name: Avvia build
        run: npm run build

      - name: Configura Pages
        uses: actions/configure-pages@v5

      - name: Carica l'artefatto di build (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
